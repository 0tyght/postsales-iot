name: Deploy Portal PWA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/admin-web/**"
      - "apps/technician-web/src/**"
      - "apps/technician-web/public/icon-*.png"
      - "scripts/copy-pwa-assets.mjs"
      - ".github/workflows/deploy-portal-pwa.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin-web/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: /postsales-iot/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/admin-web/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
